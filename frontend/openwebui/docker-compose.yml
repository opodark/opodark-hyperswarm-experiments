services:

  # ─────────────────────────────
  # OLLAMA
  # ─────────────────────────────

  ollama:

    image: ollama/ollama

    container_name: hyperswarm-ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: unless-stopped


  # ─────────────────────────────
  # OPEN WEBUI
  # ─────────────────────────────

  open-webui:

    image: ghcr.io/open-webui/open-webui:main

    container_name: hyperswarm-webui

    ports:
      - "3000:8080"

    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

    depends_on:
      - ollama

    volumes:
      - openwebui_data:/app/backend/data

    restart: unless-stopped


  # ─────────────────────────────
  # HYPERSWARM CONTROL PLANE
  # ─────────────────────────────

  control-plane:

    image: python:3.11-slim

    container_name: hyperswarm-control-plane

    working_dir: /app

    command: >
      sh -c "
      pip install fastapi uvicorn &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "

    ports:
      - "8000:8000"

    volumes:
      - ../../control_plane/api:/app

    restart: unless-stopped


volumes:

  ollama_data:
  openwebui_data: